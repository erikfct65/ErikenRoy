name: Curaçao Deal Check

on:
  schedule:
    - cron: '0 9,17 * * *' # Elke dag om 9u en 17u
  workflow_dispatch: # Zorgt dat je de knop "Run workflow" krijgt

jobs:
  check-deals:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v3

      - name: Python instellen
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installeren tools
        run: |
          pip install playwright requests beautifulsoup4
          playwright install chromium

      - name: Start de bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python Curacaodeal.py
